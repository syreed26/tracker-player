<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indopride Player Dashboard</title>

<style>
body {
    margin: 0;
    background: #020617;
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
    background: #0f172a;
    font-size: 24px;
    font-weight: bold;
}

/* STATS */
.stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 20px;
}

.box {
    background: #1e293b;
    padding: 15px 25px;
    border-radius: 12px;
    font-size: 18px;
}

/* SEARCH */
.search-box {
    text-align: center;
}

#search {
    padding: 12px;
    width: 320px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

/* PLAYER GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #0f172a;
    padding: 15px;
    border-radius: 12px;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    background: #1e293b;
}

.name {
    font-size: 18px;
    font-weight: bold;
}

.id {
    font-size: 14px;
    color: #94a3b8;
}

.online {
    margin-top: 10px;
    font-size: 13px;
    color: #22c55e;
}

.info {
    text-align: center;
    font-size: 14px;
    color: #facc15;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: #64748b;
}
</style>
</head>

<body>

<div class="header">
    🎮 Indopride Player Dashboard
</div>

<div class="stats">
    <div class="box">👥 Players: <span id="total">0</span></div>
    <div class="box">🔄 Refresh: 5s</div>
</div>

<div class="search-box">
    <input type="text" id="search" placeholder="Search player...">
</div>

<div class="container" id="playerList"></div>

<div class="footer">
    Powered by FiveM API Frontend
</div>

<script>
const API_URL = "https://servers-frontend.fivem.net/api/servers/single/bak4pl";

let allPlayers = [];

// 🔥 clean nama
function cleanName(name) {
    if (!name) return "";
    return name.replace(/\^\d/g, "").toLowerCase();
}

// 🔥 fetch data
async function fetchPlayers() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        console.log(data);

        // ✅ jumlah player REAL
        const totalPlayers = data.Data.clients || 0;
        document.getElementById("total").innerText = totalPlayers;

        // ❌ list player (sering kosong)
        allPlayers = data.Data.players || [];

        displayPlayers();

    } catch (err) {
        console.log("Error:", err);
    }
}

// 🔥 render UI
function displayPlayers() {
    const container = document.getElementById("playerList");
    const keyword = cleanName(document.getElementById("search").value);

    container.innerHTML = "";

    // ❗ kalau player list disembunyikan
    if (!allPlayers.length) {
        container.innerHTML = `
            <div class="info">
                ⚠️ Player list disembunyikan oleh server<br><br>
                👥 Total online: ${document.getElementById("total").innerText}
            </div>
        `;
        return;
    }

    const filtered = allPlayers.filter(p =>
        cleanName(p.name).includes(keyword)
    );

    if (!filtered.length) {
        container.innerHTML = "<p style='text-align:center;'>Tidak ada player ditemukan</p>";
        return;
    }

    filtered.forEach(p => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="name">${p.name}</div>
            <div class="id">ID: ${p.id}</div>
            <div class="online">🟢 Online</div>
        `;

        container.appendChild(card);
    });
}

// 🔍 search realtime
document.getElementById("search").addEventListener("input", displayPlayers);

// 🚀 load awal
fetchPlayers();

// 🔄 auto refresh
setInterval(fetchPlayers, 5000);
</script>

</body>
</html>
